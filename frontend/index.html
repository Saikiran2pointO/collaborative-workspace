<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collaborative Code Editor</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #282a36; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        /* THE NEW UI BADGE */
        .user-badge {
            position: absolute;
            top: 20px;
            right: 30px;
            background-color: #ff79c6; /* Dracula Theme Pink */
            color: #282a36;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 10;
            transition: all 0.3s ease;
        }

        .editor-container {
            width: 80vw;
            height: 80vh;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden; 
        }
        .CodeMirror {
            height: 100%;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="user-badge" id="userBadge">Live Users: 0</div>

    <div class="editor-container">
        <textarea id="editor"></textarea>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>

    <script>
        const editorElement = document.getElementById('editor');
        const userBadge = document.getElementById('userBadge');
        
        const editor = CodeMirror.fromTextArea(editorElement, {
            mode: "python",
            theme: "dracula",
            lineNumbers: true,
            indentUnit: 4,
            matchBrackets: true
        });

        editor.setValue("# Welcome to the Collaborative Python Editor\n# Start typing below...\n\n");

        const ws = new WebSocket('ws://localhost:8000/ws');

        ws.onopen = function() {
            console.log("Connected to the backend!");
        };

        // UPDATED: Now parses JSON to decide if it updates the Code or the User Badge
        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);

            if (data.type === 'system') {
                // Update the badge with the live count
                userBadge.innerText = 'Live Users: ' + data.active_users;
                
                // A quick flash animation to make it feel responsive
                userBadge.style.transform = 'scale(1.1)';
                setTimeout(() => userBadge.style.transform = 'scale(1)', 200);

            } else if (data.type === 'code') {
                // Update the editor just like before
                const currentCursor = editor.getCursor(); 
                if (editor.getValue() !== data.content) {
                    editor.setValue(data.content);
                    editor.setCursor(currentCursor); 
                }
            }
        };

        editor.on('change', function(instance, changeObj) {
            if (changeObj.origin !== 'setValue') {
                ws.send(instance.getValue());
            }
        });
    </script>
</body>
</html>

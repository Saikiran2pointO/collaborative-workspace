<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collaborative Code Editor</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #282a36; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* --- NEW: Modal Styles --- */
        #loginModal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: #282a36;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            color: #f8f8f2;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid #444;
        }
        .modal-content input {
            padding: 10px;
            font-size: 16px;
            border-radius: 4px;
            border: none;
            outline: none;
            margin-right: 10px;
        }
        .modal-content button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #50fa7b; /* Dracula Green */
            color: #282a36;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        
        /* --- NEW: Loading Overlay Styles --- */
        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(40, 42, 54, 0.95); /* Solid Dracula background */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            color: #f8f8f2;
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #50fa7b; /* Dracula Green */
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }

        /* --- UPDATED: User Badge to hold a list --- */
        .user-badge {
            position: absolute;
            top: 20px;
            right: 30px;
            background-color: #bd93f9; /* Dracula Purple */
            color: #282a36;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 10;
            min-width: 150px;
        }
        .user-badge h3 { margin: 0 0 10px 0; font-size: 16px; }
        .user-badge ul { margin: 0; padding-left: 20px; font-size: 14px; font-weight: bold;}

        .editor-container {
            width: 80vw;
            height: 80vh;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden; 
        }
        .CodeMirror { height: 100%; font-size: 16px; }
    </style>
</head>
<body>

    <div id="loginModal">
        <div class="modal-content">
            <h2>Join the Workspace</h2>
            <input type="text" id="usernameInput" placeholder="Enter your name...">
            <button id="joinBtn">Join</button>
        </div>
    </div>

    <div class="user-badge" id="userBadge" style="display: none;">
        <h3 id="userCount">Live Users: 0</h3>
        <ul id="userList"></ul>
    </div>

    <div id="loadingOverlay" style="display: none;">
        <div class="spinner"></div>
        <p id="loadingText">Waking up the server...<br><small style="color: #6272a4;">(Free cloud servers can take up to 50 seconds to start)</small></p>
    </div>

    <div class="editor-container">
        <textarea id="editor"></textarea>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>

    <script>
        const editorElement = document.getElementById('editor');
        const loginModal = document.getElementById('loginModal');
        const usernameInput = document.getElementById('usernameInput');
        const joinBtn = document.getElementById('joinBtn');
        const userBadge = document.getElementById('userBadge');
        const userCount = document.getElementById('userCount');
        const userList = document.getElementById('userList');
        
        let ws; // Declare WebSocket variable globally

        const editor = CodeMirror.fromTextArea(editorElement, {
            mode: "python",
            theme: "dracula",
            lineNumbers: true,
            indentUnit: 4,
            matchBrackets: true
        });
        editor.setValue("# Welcome to the Collaborative Python Editor\n# Start typing below...\n\n");

        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');

        // --- UPDATED: Show loader when clicking Join ---
        joinBtn.addEventListener('click', () => {
            const username = usernameInput.value.trim();
            if (username !== "") {
                loginModal.style.display = 'none'; 
                loadingOverlay.style.display = 'flex'; // Show the loading screen
                connectToServer(username);
            }
        });

        // Allow pressing "Enter" to join
        usernameInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') joinBtn.click();
        });

        function connectToServer(username) {
            // Replace with your actual Render URL
            ws = new WebSocket(`wss://my-collab-backend.onrender.com/ws?username=${encodeURIComponent(username)}`);

            // --- NEW: Handle Successful Connection ---
            ws.onopen = function() {
                console.log("Connected as " + username);
                loadingOverlay.style.display = 'none'; // Hide the loader
                userBadge.style.display = 'block';     // Show the user badge
            };

            // --- NEW: Handle Connection Errors ---
            ws.onerror = function() {
                document.querySelector('.spinner').style.display = 'none'; // Hide spinner
                loadingText.innerHTML = 'Failed to connect to the server.<br><small style="color: #ff5555;">The server might be down. Please refresh to try again.</small>';
            };

            // --- NEW: Handle Disconnections ---
            ws.onclose = function() {
                if (loadingOverlay.style.display === 'none') {
                    // If they were already in the app, show them they disconnected
                    loadingOverlay.style.display = 'flex';
                }
                document.querySelector('.spinner').style.display = 'none';
                loadingText.innerHTML = 'Connection lost.<br><small style="color: #ff5555;">Please refresh the page to reconnect.</small>';
                userBadge.style.display = 'none';
            };

            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);

                if (data.type === 'system') {
                    userCount.innerText = `Live Users: ${data.count}`;
                    userList.innerHTML = '';
                    data.users.forEach(user => {
                        const li = document.createElement('li');
                        li.innerText = user;
                        userList.appendChild(li);
                    });

                } else if (data.type === 'code') {
                    const currentCursor = editor.getCursor(); 
                    if (editor.getValue() !== data.content) {
                        editor.setValue(data.content);
                        editor.setCursor(currentCursor); 
                    }
                }
            };

            editor.on('change', function(instance, changeObj) {
                if (changeObj.origin !== 'setValue') {
                    ws.send(instance.getValue());
                }
            });
        }
    </script>
</body>
</html>

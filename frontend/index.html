<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Collaborative Editor</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #282a36; 
            margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        /* Modal Styles */
        #loginModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex; justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: #282a36; padding: 40px; border-radius: 8px; text-align: center;
            color: #f8f8f2; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #444;
            width: 350px;
        }
        input {
            width: 80%; padding: 12px; margin-bottom: 20px; font-size: 16px;
            border-radius: 4px; border: none; outline: none; text-align: center;
        }
        button {
            width: 85%; padding: 12px; font-size: 16px; font-weight: bold; cursor: pointer;
            border: none; border-radius: 4px; transition: 0.2s; margin-bottom: 10px;
        }
        .btn-primary { background-color: #50fa7b; color: #282a36; }
        .btn-primary:hover { background-color: #40c962; }
        .btn-secondary { background-color: #bd93f9; color: #282a36; }
        .btn-secondary:hover { background-color: #9d72d8; }
        .divider { margin: 15px 0; font-size: 14px; color: #6272a4; }

        /* Loading Overlay */
        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(40, 42, 54, 0.95); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 200; color: #f8f8f2;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1); border-top: 4px solid #50fa7b;
            border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Badges */
        .top-bar {
            position: absolute; top: 20px; right: 30px; display: flex; gap: 15px; z-index: 10;
        }
        .room-badge {
            background-color: #ffb86c; color: #282a36; padding: 15px; border-radius: 8px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); text-align: center;
        }
        .room-badge span { font-size: 24px; display: block; margin-top: 5px; letter-spacing: 2px;}
        .user-badge {
            background-color: #bd93f9; color: #282a36; padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); min-width: 150px;
        }
        .user-badge h3 { margin: 0 0 10px 0; font-size: 16px; }
        .user-badge ul { margin: 0; padding-left: 20px; font-size: 14px; font-weight: bold;}

        .editor-container { width: 80vw; height: 80vh; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 8px; overflow: hidden; }
        .CodeMirror { height: 100%; font-size: 16px; }
    </style>
</head>
<body>

    <div id="loginModal">
        <div class="modal-content">
            
            <div id="step1">
                <h2>Enter Your Name</h2>
                <input type="text" id="usernameInput" placeholder="e.g. Alex" autocomplete="off">
                <button class="btn-primary" id="nextBtn">Next</button>
            </div>

            <div id="step2" style="display: none;">
                <h2>Join or Host</h2>
                <input type="text" id="roomInput" placeholder="Enter 6-Digit Code" maxlength="6" autocomplete="off">
                <button class="btn-primary" id="joinBtn">Join Room</button>
                <div class="divider">OR</div>
                <button class="btn-secondary" id="hostBtn">Host New Room</button>
            </div>

        </div>
    </div>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <p id="loadingText">Connecting to secure room...</p>
    </div>

    <div class="top-bar" id="uiBadges" style="display: none;">
        <div class="room-badge">Room Code<span id="displayRoomCode">------</span></div>
        <div class="user-badge">
            <h3 id="userCount">Live Users: 0</h3>
            <ul id="userList"></ul>
        </div>
    </div>

    <div class="editor-container">
        <textarea id="editor"></textarea>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>

    <script>
        // DOM Elements
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const usernameInput = document.getElementById('usernameInput');
        const roomInput = document.getElementById('roomInput');
        const nextBtn = document.getElementById('nextBtn');
        const joinBtn = document.getElementById('joinBtn');
        const hostBtn = document.getElementById('hostBtn');
        const displayRoomCode = document.getElementById('displayRoomCode');
        const uiBadges = document.getElementById('uiBadges');
        const loginModal = document.getElementById('loginModal');
        const loadingOverlay = document.getElementById('loadingOverlay');

        let globalUsername = "";
        let ws;

        // Initialize Editor
        const editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
            mode: "python", theme: "dracula", lineNumbers: true, indentUnit: 4, matchBrackets: true
        });
        editor.setValue("# Welcome to your private workspace.\n# Start typing...\n\n");

        // UI Logic: Step 1 -> Step 2
        nextBtn.addEventListener('click', () => {
            if (usernameInput.value.trim() !== "") {
                globalUsername = usernameInput.value.trim();
                step1.style.display = 'none';
                step2.style.display = 'block';
            }
        });

        // UI Logic: Host Room
        hostBtn.addEventListener('click', () => {
            // Generate a random 6 digit code
            const generatedCode = Math.floor(100000 + Math.random() * 900000).toString();
            startConnection(globalUsername, generatedCode);
        });

        // UI Logic: Join Room
        joinBtn.addEventListener('click', () => {
            const code = roomInput.value.trim();
            if (code.length === 6) {
                startConnection(globalUsername, code);
            } else {
                alert("Please enter a valid 6-digit code.");
            }
        });

        function startConnection(username, roomCode) {
            loginModal.style.display = 'none';
            loadingOverlay.style.display = 'flex';
            displayRoomCode.innerText = roomCode; // Update the UI badge with the code
            
            // BE SURE TO REPLACE THIS URL WITH YOUR RENDER URL
            const renderURL = "your-actual-render-name.onrender.com"; 
            
            // Note the new URL structure: ?username=X&room_code=Y
            ws = new WebSocket(`wss://my-collab-backend-382d.onrender.com/ws?username=${encodeURIComponent(username)}&room_code=${roomCode}`);

            ws.onopen = function() {
                loadingOverlay.style.display = 'none';
                uiBadges.style.display = 'flex';
            };

            ws.onerror = function() {
                document.querySelector('.spinner').style.display = 'none';
                document.getElementById('loadingText').innerHTML = 'Failed to connect.<br><small style="color: #ff5555;">Server might be waking up or down.</small>';
            };

            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                if (data.type === 'system') {
                    document.getElementById('userCount').innerText = `Live Users: ${data.count}`;
                    const userList = document.getElementById('userList');
                    userList.innerHTML = '';
                    data.users.forEach(user => {
                        const li = document.createElement('li');
                        li.innerText = user;
                        userList.appendChild(li);
                    });
                } else if (data.type === 'code') {
                    const currentCursor = editor.getCursor(); 
                    if (editor.getValue() !== data.content) {
                        editor.setValue(data.content);
                        editor.setCursor(currentCursor); 
                    }
                }
            };

            editor.on('change', function(instance, changeObj) {
                if (changeObj.origin !== 'setValue') {
                    ws.send(instance.getValue());
                }
            });
        }
    </script>
</body>
</html>
